<aside class="sidebar" [class.sidebar-open]="isOpen()" [class.sidebar-collapsed]="!isExpanded()">

  <!-- Mobile Header -->
  <div class="sidebar-mobile-header">
    <span class="sidebar-mobile-title">Menu</span>
    <button 
      type="button"
      class="sidebar-close-btn" 
      aria-label="Close menu"
      (click)="closeRequest.emit()">
      ✕
    </button>
  </div>

  <!-- Desktop Toggle Button -->
  <div class="sidebar-toggle-btn-wrap">
    <button 
      type="button"
      class="sidebar-toggle-btn"
      [title]="isExpanded() ? 'Collapse sidebar' : 'Expand sidebar'"
      aria-label="Toggle sidebar"
      (click)="onToggleExpanded()">
      <span class="toggle-icon">{{ isExpanded() ? '‹' : '›' }}</span>
    </button>
  </div>

  <!-- Main Navigation -->
  <nav class="sidebar-nav" aria-label="Main navigation">
    <p class="section-label" *ngIf="isExpanded()">Main</p>
    <ng-container *ngFor="let item of getMenuItems()">
      <a 
        [routerLink]="item.route" 
        routerLinkActive="active" 
        class="nav-item" 
        [title]="!isExpanded() ? item.label : ''"
        (click)="onNavClick()">
        <span class="nav-icon-wrap" aria-hidden="true">{{ item.icon }}</span>
        <span *ngIf="isExpanded()" class="nav-label">{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>

  <div class="sidebar-divider"></div>

  <!-- Joined Communities -->
  <div class="sidebar-section">
    <p class="section-label" *ngIf="isExpanded()">Your Communities</p>
    <ng-container *ngIf="joinedCommunities().length > 0; else noCommunities">
      <ng-container *ngFor="let community of joinedCommunities()">
        <a 
          [routerLink]="['/community', community.id]" 
          routerLinkActive="active"
          class="community-item" 
          [title]="!isExpanded() ? community.name : ''"
          (click)="onNavClick()">
          <span class="community-icon-wrap" aria-hidden="true">
            {{ community.name.charAt(0).toUpperCase() }}
          </span>
          <span *ngIf="isExpanded()" class="community-name">{{ community.name }}</span>
          <span *ngIf="isExpanded()" class="member-badge">{{ community.members | number }}</span>
        </a>
      </ng-container>
    </ng-container>
    <ng-template #noCommunities>
      <p class="empty-hint" *ngIf="isExpanded()">No communities joined yet.</p>
    </ng-template>
  </div>

  <div class="sidebar-divider"></div>

  <!-- Discover -->
  <div class="sidebar-section">
    <p class="section-label" *ngIf="isExpanded()">Discover</p>
    <a 
      routerLink="/communities" 
      class="nav-item" 
      title="Explore communities"
      (click)="onNavClick()">
      <span class="nav-icon-wrap" aria-hidden="true">🔍</span>
      <span *ngIf="isExpanded()" class="nav-label">Explore</span>
    </a>
    <a 
      class="nav-item nav-item-muted" 
      title="Trending (coming soon)"
      [attr.aria-disabled]="true">
      <span class="nav-icon-wrap" aria-hidden="true">🔥</span>
      <span *ngIf="isExpanded()" class="nav-label">Trending</span>
      <span *ngIf="isExpanded()" class="coming-soon-badge">Soon</span>
    </a>
    <a 
      class="nav-item nav-item-muted" 
      title="Popular (coming soon)"
      [attr.aria-disabled]="true">
      <span class="nav-icon-wrap" aria-hidden="true">⭐</span>
      <span *ngIf="isExpanded()" class="nav-label">Popular</span>
      <span *ngIf="isExpanded()" class="coming-soon-badge">Soon</span>
    </a>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="isExpanded()">
    <p class="footer-copy">© 2026 Community App</p>
    <div class="footer-links">
      <a href="#" aria-label="About">About</a>
      <a href="#" aria-label="Privacy">Privacy</a>
      <a href="#" aria-label="Terms">Terms</a>
    </div>
  </div>

</aside>
