<nav class="navbar" [ngClass]="customClass">
  <!-- Navbar Container -->
  <div class="nav-container">

    <!-- LEFT: Hamburger + Brand -->
    <div class="nav-left">
      <button 
        type="button"
        class="nav-hamburger" 
        aria-label="Toggle menu"
        aria-expanded="false"
        (click)="toggleMobileMenu()">
        <span class="hamburger-icon">☰</span>
      </button>

      <a routerLink="/dashboard" class="nav-brand" aria-label="Community home">
        <span class="brand-name">Community</span>
      </a>
    </div>

    <!-- CENTER: Location Badge (if provided) -->
    <div *ngIf="showLocationBadge && currentLocation" class="nav-location">
      <app-location-badge 
        [postcode]="currentLocation.postcode"
        [area]="currentLocation.area"
        [distance]="currentLocation.distance"
        variant="primary"
        size="sm"
        [clickable]="true"
        (click)="onLocationClick()">
      </app-location-badge>
    </div>

    <!-- CENTER-RIGHT: Search -->
    <div class="nav-search" [class.active]="searchFocused" *ngIf="showSearch">
      <span class="nav-search-icon">🔍</span>
      <input
        class="nav-search-input"
        type="text"
        placeholder="Search..."
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()"
        (focus)="searchFocused = true"
        (blur)="searchFocused = false"
        aria-label="Search"
      />
      <span class="nav-search-kbd" aria-hidden="true">Ctrl+K</span>
    </div>

    <!-- RIGHT: Actions -->
    <div class="nav-actions">

      <!-- Notifications -->
      <button 
        type="button"
        class="nav-icon-btn" 
        aria-label="Notifications"
        [attr.aria-badge]="notificationService.unreadCount() > 0 ? notificationService.unreadCount() : null">
        <span class="icon">🔔</span>
        <span 
          *ngIf="notificationService.unreadCount() > 0" 
          class="nav-badge"
          aria-hidden="true">
          {{ notificationService.unreadCount() > 9 ? '9+' : notificationService.unreadCount() }}
        </span>
      </button>

      <!-- Avatar / User Menu -->
      <div class="nav-user">
        <app-avatar 
          [name]="userName()"
          size="sm"
          customClass="nav-avatar-btn">
        </app-avatar>
        
        <div class="nav-user-menu">
          <div class="user-menu-header">
            <strong>{{ userName() }}</strong>
            <span class="user-email">{{ authService.currentUser()?.email }}</span>
          </div>

          <div class="user-menu-section">
            <a routerLink="/profile" class="user-menu-item">
              <span>👤 My Profile</span>
            </a>
            <a routerLink="/messaging" class="user-menu-item">
              <span>💬 Messages</span>
            </a>
            <a routerLink="/notifications" class="user-menu-item">
              <span>🔔 Notifications</span>
              <span *ngIf="notificationService.unreadCount() > 0" class="unread-count">
                {{ notificationService.unreadCount() }}
              </span>
            </a>
          </div>

          <div class="user-menu-footer">
            <button 
              type="button"
              class="user-logout-btn"
              (click)="logout()">
              🚪 Sign out
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom Divider -->
  <div class="nav-divider"></div>
</nav>
