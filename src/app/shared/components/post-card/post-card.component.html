<div class="post-card">
  <!-- Header -->
  <div class="post-header">
    <div class="post-header-left">
      <div class="post-avatar">{{ getInitials(post().author.displayName) }}</div>
      <div class="post-meta">
        <div class="post-community">
          <mat-icon class="community-icon">{{ post().community.icon }}</mat-icon>
          <a [routerLink]="['/community', post().community.id]" class="community-name">{{ post().community.name }}</a>
        </div>
        <div class="post-author-row">
          <a [routerLink]="['/profile', post().author.id]" class="author-name">{{ post().author.displayName }}</a>
          <span class="meta-dot">·</span>
          <span class="post-time">{{ post().createdAt | timeAgo }}</span>
        </div>
      </div>
    </div>
    <button class="more-btn" [matMenuTriggerFor]="postMenu" aria-label="Post options">
      <mat-icon>more_horiz</mat-icon>
    </button>
    <mat-menu #postMenu="matMenu">
      <button mat-menu-item><mat-icon>bookmark_border</mat-icon><span>Save post</span></button>
      <button mat-menu-item><mat-icon>link</mat-icon><span>Copy link</span></button>
      <button mat-menu-item class="report-item"><mat-icon>flag</mat-icon><span>Report</span></button>
    </mat-menu>
  </div>

  <!-- Body -->
  <div class="post-body">
    <h3 class="post-title">
      <a [routerLink]="['/post', post().id]">{{ post().title }}</a>
    </h3>
    <p class="post-excerpt">{{ post().content | truncate: 220 }}</p>
    @if (post().imageUrl) {
      <div class="post-image-wrap">
        <img [src]="post().imageUrl" [alt]="post().title" loading="lazy" />
      </div>
    }
  </div>

  <!-- Footer -->
  <div class="post-footer">
    <div class="post-actions">
      <button class="action-btn like-btn" [class.liked]="post().isLiked" (click)="onLike()" matTooltip="Like">
        <mat-icon>{{ post().isLiked ? 'favorite' : 'favorite_border' }}</mat-icon>
        <span>{{ post().likes }}</span>
      </button>
      <button class="action-btn" (click)="onComment()" matTooltip="Comment">
        <mat-icon>chat_bubble_outline</mat-icon>
        <span>{{ post().comments }}</span>
      </button>
      <button class="action-btn" matTooltip="Share">
        <mat-icon>ios_share</mat-icon>
        <span>Share</span>
      </button>
    </div>
    <span class="category-badge">{{ post().community.name }}</span>
  </div>
</div>
